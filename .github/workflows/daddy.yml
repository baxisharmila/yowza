name: daddy
on:
  push:
    branches: [ "main" ]

jobs:
    eek_ack:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: eek_ack
          run: |
            npm install
            timeout 350m node daddy.js
  
